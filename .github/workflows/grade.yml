name: 🎓 Auto-Grade Labs

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report requests ultralytics pandas chromadb sentence-transformers numpy opencv-python fastapi uvicorn python-dotenv
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🧪 Run All Lab Tests
        id: run_tests
        run: |
          # Run each lab in its own directory to avoid module name clashes
          set +e  # don't stop on test failures
          for lab in lab-01-api-fetcher lab-02-llm-json lab-03-toon-convert lab-04-vehicle-detect lab-05-rag-qa; do
            echo "--- Testing $lab ---"
            (cd $lab && python -m pytest tests/ --tb=short \
              --json-report \
              --json-report-file=../../test_results_${lab}.json \
              -v) || true
          done

          # Merge JSON reports
          python grader/merge_reports.py


      - name: 📊 Compute & Post Score
        run: python grader/score.py

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: test_results.json
          retention-days: 7
